name: Build soLoader for Android ARM64

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:   # lets you manually trigger the build

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 26.1.10909125
        run: |
          sdkmanager --install "ndk;26.1.10909125"

      - name: Build with CMake
        run: |
          cmake -B build -S . \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_HOME/ndk/26.1.10909125/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24
          cmake --build build

      - name: Upload soLoader binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: soLoader-arm64
          path: build/soLoader
