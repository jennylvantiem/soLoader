name: Build soLoader with CMake

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK r27
        run: sdkmanager --install "ndk;27.0.12077973"

      - name: Debug - show directory structure
        run: |
          echo "Repository root files:"
          ls -la
          echo "Looking for CMakeLists.txt:"
          find . -name "CMakeLists.txt"

      - name: Build with CMake
        run: |
          export NDK_PATH=${ANDROID_SDK_ROOT}/ndk/27.0.12077973
          cmake -B build -S . \
            -DCMAKE_TOOLCHAIN_FILE=${NDK_PATH}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_VERBOSE_MAKEFILE=ON
          cmake --build build -v

      - name: Upload soLoader binary
        uses: actions/upload-artifact@v4
        with:
          name: soLoader-arm64
          path: build/soLoader
